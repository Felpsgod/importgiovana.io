<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImportGiovana - Extratos Sicredi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --verde: #04A03D; --vermelho: #BF132E; --azul-escuro: #0775BE;
            --azul-claro: #7CB3D8; --laranja: #F8A836; --fundo-app: #f8f9fa; --texto: #333333;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { margin: 0; padding: 0; background-color: var(--fundo-app); color: var(--texto); }

        /* ================= DASHBOARD UI ================= */
        .dashboard-ui { display: flex; flex-direction: column; min-height: 100vh; }
        .topbar { background-color: var(--azul-escuro); color: white; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .topbar h1 { margin: 0; font-size: 22px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .container { max-width: 1200px; width: 100%; margin: 30px auto; padding: 0 20px; display: flex; flex-direction: column; gap: 20px; }

        .upload-section { display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; border: 2px dashed var(--azul-claro); border-radius: 12px; padding: 30px 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .upload-section:hover { border-color: var(--azul-escuro); background-color: #f0f7fb; transform: translateY(-2px); }
        .upload-section i { font-size: 35px; color: var(--azul-claro); margin-bottom: 10px; }
        .upload-section h3 { margin: 0 0 5px 0; color: var(--azul-escuro); font-size: 18px; }
        .upload-section input { display: none; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid var(--laranja); }
        .checkbox-group { display: flex; align-items: center; gap: 10px; font-weight: 600; color: var(--azul-escuro); cursor: pointer; }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; color: white; }
        .btn-primary { background-color: var(--azul-escuro); } .btn-primary:hover { background-color: #055c96; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; border-top: 4px solid var(--azul-claro); box-shadow: 0 3px 8px rgba(0,0,0,0.04); transition: 0.2s; }
        .card:hover { transform: translateY(-3px); border-top-color: var(--azul-escuro); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        .card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 15px; }
        .card-title { font-size: 15px; font-weight: bold; color: var(--azul-escuro); margin-bottom: 3px; }
        .card-actions { display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid #eee; padding-top: 10px; }
        .btn-action { padding: 7px 12px; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; gap: 5px; }
        .btn-view { background-color: #fff4e6; color: var(--laranja); } .btn-view:hover { background-color: var(--laranja); color: white; }
        .btn-download { background-color: #e6f5ea; color: var(--verde); } .btn-download:hover { background-color: var(--verde); color: white; }
        .btn-delete { background-color: #fceaea; color: var(--vermelho); } .btn-delete:hover { background-color: var(--vermelho); color: white; }

        /* ================= MODAL DE VISUALIZAÇÃO ================= */
        .modal-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); overflow-y: auto; padding: 30px 0; }
        .modal-container { background-color: transparent; max-width: 800px; margin: 0 auto; position: relative; display: flex; justify-content: center; }
        .close-modal { position: absolute; right: -40px; top: 0; font-size: 24px; color: #fff; background: var(--vermelho); border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; z-index: 1001; }

        /* ================= ÁREA DE IMPRESSÃO E QUEBRA DE PÁGINA ================= */
        #print-container { display: none; }
        #preview-content { display: block; width: 100%; }
        
        .page { font-family: Arial, sans-serif; font-size: 10px; line-height: 1.15; color: #000; background: #fff; width: 800px; margin: 0 auto; padding: 20px 30px; box-sizing: border-box; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
        .page-break { page-break-after: always; }
        
        /* Divisor Visual (Mostra na tela se a página for quebrada) */
        .page-divider { display: none; text-align: center; margin: 25px 0 15px 0; position: relative; }
        .page-divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; border-top: 1px dashed #ccc; z-index: 1; }
        .page-divider span { background: #fff; padding: 0 15px; position: relative; z-index: 2; color: #999; font-style: italic; font-size: 11px; }

        /* Classe que força a quebra de página */
        .force-break { page-break-before: always; break-before: page; }
        .force-break .page-divider { display: block; } /* Ativa o tracejado no visualizador */

        .dotted-line { display: flex; align-items: baseline; margin-bottom: 3px; }
        .dotted-line span.label { white-space: nowrap; font-weight: bold; color: #111; }
        .dotted-line span.dots { flex-grow: 1; border-bottom: 1px dotted #999; margin: 0 5px; }
        
        .month-title { font-weight: bold; font-size: 13px; margin-bottom: 10px; color: #111; text-transform: uppercase; }
        .section-title { color: white; font-weight: bold; font-size: 11px; margin-top: 15px; margin-bottom: 3px; padding: 4px 6px; text-transform: uppercase; }
        .bg-verde { background-color: var(--verde); } .bg-vermelho { background-color: var(--vermelho); }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 3px; }
        th, td { border: 1px solid #ccc; padding: 4px; vertical-align: middle; }
        th { background-color: #eaeaea; color: #111; font-weight: bold; text-align: left; }
        tbody tr:nth-child(even) { background-color: #fcfcfc; }
        
        .col-data { width: 65px; text-align: center; } 
        .col-desc { width: auto; } 
        .col-doc { width: 75px; text-align: center; } 
        .col-valor { width: 85px; text-align: right; font-weight: bold; } 
        .col-saldo { width: 85px; text-align: right; font-weight: bold; color: #444; }
        
        .total-row { display: flex; justify-content: flex-end; margin-top: 0; margin-bottom: 6px; background-color: #eaeaea; padding: 4px 6px; border: 1px solid #ccc; border-top: none; font-weight: bold; color: #111; }
        .total-row span.label { margin-right: 20px; text-transform: uppercase; }
        .final-totals { margin-top: 15px; padding: 12px; border: 2px solid #2c3e50; background-color: #f8f9fa; border-radius: 4px; }

        /* Remove o traço divisor na hora de exportar para PDF */
        @media print {
            body { background-color: #fff; margin: 0; padding: 0; }
            .dashboard-ui, .modal-overlay, .page-divider { display: none !important; } 
            #print-container { display: block !important; } 
            .page { width: 100%; max-width: 100%; padding: 0; margin: 0; box-shadow: none; border: none; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

<div class="dashboard-ui">
    <div class="topbar">
        <h1><i class="fa-solid fa-building-columns"></i> ImportGiovana</h1>
        <div style="font-size: 14px;">Gestão de Extratos e Conversão PDF</div>
    </div>
    <div class="container">
        <label class="upload-section" for="file-upload">
            <i class="fa-solid fa-file-arrow-up"></i>
            <h3>Importar Extrato Sicredi</h3>
            <p>Selecione os PDFs. O sistema quebra a folha automaticamente se o extrato for muito grande.</p>
            <input type="file" id="file-upload" accept="application/pdf" multiple>
        </label>
        <div class="toolbar">
            <label class="checkbox-group"><input type="checkbox" id="select-all"><span>Selecionar Todos</span></label>
            <button class="btn btn-primary" onclick="printSelected()"><i class="fa-solid fa-file-pdf"></i> Baixar Selecionados</button>
        </div>
        <div class="cards-grid" id="cards-container"><p style="color: #888; text-align: center; grid-column: 1/-1;">Carregando banco de dados...</p></div>
    </div>
</div>

<div class="modal-overlay" id="view-modal">
    <div class="modal-container">
        <button class="close-modal" onclick="closePreview()"><i class="fa-solid fa-xmark"></i></button>
        <div id="preview-content"></div>
    </div>
</div>

<div id="print-container"></div>

<template id="report-template">
    <div class="page page-break">
        <div class="container-receitas">
            <div class="month-title tpl-mes">MÊS/ANO</div>
            
            <div class="dotted-line"><span class="label">Capital Social</span><span class="dots"></span><span class="value">R$ 0,00</span></div>
            <div class="dotted-line"><span class="label">Conta Corrente Sicredi Inicial</span><span class="dots"></span><span class="value tpl-conta-corrente">R$ 0,00</span></div>

            <div class="section-title bg-verde">RECEITAS</div>
            <table>
                <thead><tr><th class="col-data">Data</th><th class="col-desc">Descrição</th><th class="col-doc">Documento</th><th class="col-valor">Valor</th><th class="col-saldo">Saldo (R$)</th></tr></thead>
                <tbody id="tbl-receitas"></tbody>
            </table>
            <div class="total-row"><span class="label">Total Receitas</span><span class="tpl-total-receitas" style="color: var(--verde);">0,00</span></div>
        </div>

        <div class="container-debitos">
            <div class="page-divider"><span>Página Seguinte</span></div>

            <div class="section-title bg-vermelho">DÉBITOS</div>
            <table>
                <thead><tr><th class="col-data">Data</th><th class="col-desc">Descrição</th><th class="col-doc">Documento</th><th class="col-valor">Valor</th><th class="col-saldo">Saldo (R$)</th></tr></thead>
                <tbody id="tbl-debitos"></tbody>
            </table>
            <div class="total-row"><span class="label">Total Débitos</span><span class="tpl-total-debitos" style="color: var(--vermelho);">0,00</span></div>

            <div class="final-totals">
                <div class="dotted-line"><span class="label">Total de receitas do período</span><span class="dots"></span><span class="value tpl-total-receitas" style="color: var(--verde);">R$ 0,00</span></div>
                <div class="dotted-line"><span class="label">Total de débitos do período</span><span class="dots"></span><span class="value tpl-total-debitos" style="color: var(--vermelho);">R$ 0,00</span></div>
                <div class="dotted-line" style="margin-top: 10px; border-top: 1px solid #ccc; padding-top: 10px;"><span class="label">Balanço do Período (Receitas - Débitos)</span><span class="dots"></span><span class="value tpl-saldo-final" style="font-size: 14px; color: #111;">R$ 0,00</span></div>
            </div>
        </div>
    </div>
</template>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const firebaseConfig = { databaseURL: "https://importgiovana-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const extratosRef = ref(db, 'extratos_gerados');

    window.extratosPendentes = []; 

    onValue(extratosRef, (snapshot) => {
        const container = document.getElementById('cards-container');
        container.innerHTML = ''; window.extratosPendentes = [];
        if (snapshot.exists()) {
            snapshot.forEach((child) => {
                const data = child.val(); data.firebaseKey = child.key;
                window.extratosPendentes.push(data); renderCard(data);
            });
        } else {
            container.innerHTML = '<p style="color: #888; grid-column: 1 / -1; text-align: center;">Nenhum extrato importado ainda.</p>';
        }
    });

    document.getElementById('file-upload').addEventListener('change', async function(e) {
        const files = e.target.files;
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const fileReader = new FileReader();
            
            fileReader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let rawText = '';
                
                for (let j = 1; j <= pdf.numPages; j++) {
                    const page = await pdf.getPage(j);
                    const textContent = await page.getTextContent();
                    rawText += textContent.items.map(item => item.str).join(' ') + ' ';
                }

                let txtLimpo = rawText.replace(/\s+/g, ' ');

                let dados = {
                    titulo: "Extrato",
                    fileName: file.name,
                    contaCorrente: "0,00",
                    receitas: [], 
                    debitos: []
                };

                let mPeriodo = txtLimpo.match(/Período de ([\d\/]+\s*a\s*[\d\/]+)/i);
                if(mPeriodo) dados.titulo = "Extrato: " + mPeriodo[1];

                let mSaldoAnt = txtLimpo.match(/SALDO ANTERIOR.*?([\d.,]+)/i);
                if(mSaldoAnt) dados.contaCorrente = mSaldoAnt[1];

                let blocos = txtLimpo.split(/(?=\b\d{2}\/\d{2}\/\d{4}\b)/);

                for (let b = 1; b < blocos.length; b++) {
                    let linha = blocos[b];
                    let matchData = linha.match(/^(\d{2}\/\d{2}\/\d{4})/);
                    if(!matchData) continue;
                    
                    let dataStr = matchData[1];

                    let regexValores = /-?\d{1,3}(?:\.\d{3})*,\d{2}/g;
                    let matchesMonetarios = linha.match(regexValores);
                    
                    if (matchesMonetarios && matchesMonetarios.length >= 2) {
                        let saldoCaixaStr = matchesMonetarios[matchesMonetarios.length - 1]; 
                        let valorTransacaoStr = matchesMonetarios[matchesMonetarios.length - 2]; 

                        let idxValor = linha.lastIndexOf(valorTransacaoStr);
                        let miolo = linha.substring(10, idxValor).trim();
                        
                        let partesMiolo = miolo.split(' ');
                        let docStr = '-';
                        
                        let provavelDoc = partesMiolo[partesMiolo.length - 1];
                        if (/\d/.test(provavelDoc)) {
                            docStr = partesMiolo.pop();
                        }
                        
                        let descStr = partesMiolo.join(' ');
                        let isDebito = valorTransacaoStr.includes('-');
                        let valorLimpo = valorTransacaoStr.replace('-', ''); 

                        let transacao = {
                            data: dataStr, 
                            desc: descStr.substring(0,50), 
                            doc: docStr, 
                            valor: valorLimpo, 
                            saldo: saldoCaixaStr
                        };

                        if (isDebito) {
                            dados.debitos.push(transacao);
                        } else {
                            dados.receitas.push(transacao);
                        }
                    }
                }
                push(extratosRef, dados);
            };
            fileReader.readAsArrayBuffer(file);
        }
        this.value = ''; 
    });

    window.deletarCard = function(key) {
        if(confirm("Tem certeza que deseja excluir este extrato?")) remove(ref(db, 'extratos_gerados/' + key));
    };

    function renderCard(data) {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <div>
                <div class="card-header">
                    <input type="checkbox" class="card-checkbox" value="${data.firebaseKey}">
                    <div>
                        <div class="card-title">${data.titulo}</div>
                        <div class="card-subtitle"><i class="fa-solid fa-file-pdf"></i> Original: ${data.fileName}</div>
                    </div>
                </div>
            </div>
            <div class="card-actions">
                <button class="btn-action btn-delete" onclick="deletarCard('${data.firebaseKey}')" title="Apagar"><i class="fa-solid fa-trash"></i></button>
                <button class="btn-action btn-view" onclick="openPreview('${data.firebaseKey}')" title="Apenas Visualizar"><i class="fa-solid fa-eye"></i> Visão</button>
                <button class="btn-action btn-download" onclick="printSingle('${data.firebaseKey}')" title="Exportar PDF"><i class="fa-solid fa-print"></i> PDF</button>
            </div>
        `;
        document.getElementById('cards-container').appendChild(div);
    }

    document.getElementById('select-all').addEventListener('change', e => {
        document.querySelectorAll('.card-checkbox').forEach(cb => cb.checked = e.target.checked);
    });

    window.openPreview = function(key) {
        const data = window.extratosPendentes.find(d => d.firebaseKey === key);
        if(data) {
            const previewContent = document.getElementById('preview-content');
            previewContent.innerHTML = ''; 
            gerarDocumentos(data, previewContent); 
            document.getElementById('view-modal').style.display = 'block';
        }
    };
    window.closePreview = function() { document.getElementById('view-modal').style.display = 'none'; };

    window.printSingle = function(key) {
        const data = window.extratosPendentes.find(d => d.firebaseKey === key);
        if(data) { 
            const printContainer = document.getElementById('print-container');
            printContainer.innerHTML = '';
            gerarDocumentos(data, printContainer); 
            window.print(); 
        }
    };

    window.printSelected = function() {
        const checkeds = Array.from(document.querySelectorAll('.card-checkbox:checked')).map(cb => window.extratosPendentes.find(d => d.firebaseKey === cb.value));
        if(checkeds.length === 0) return alert("Selecione pelo menos um arquivo.");
        
        const printContainer = document.getElementById('print-container');
        printContainer.innerHTML = '';
        checkeds.forEach(data => gerarDocumentos(data, printContainer, true)); 
        window.print(); 
    };

    function somarCategoria(arr) {
        if (!arr || arr.length === 0) return 0;
        return arr.reduce((acc, curr) => {
            let val = parseFloat(curr.valor.replace(/\./g, '').replace(',', '.'));
            return acc + (isNaN(val) ? 0 : val);
        }, 0);
    }

    function format(num) { return num.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2}); }

    function gerarDocumentos(data, containerAlvo, concatenar = false) {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = document.getElementById('report-template').innerHTML;
        
        tempDiv.querySelector('.tpl-mes').innerText = data.titulo;
        tempDiv.querySelector('.tpl-conta-corrente').innerText = `R$ ${data.contaCorrente}`;

        // ==========================================
        // SENSOR DE TAMANHO (Quebra de Página)
        // ==========================================
        const LIMITE_LINHAS = 15;
        const totalLinhas = (data.receitas ? data.receitas.length : 0) + (data.debitos ? data.debitos.length : 0);
        
        if (totalLinhas > LIMITE_LINHAS) {
            // Adiciona a classe que força a tabela de débitos ir para a página 2
            tempDiv.querySelector('.container-debitos').classList.add('force-break');
        }

        const totalReceitas = somarCategoria(data.receitas);
        const totalDebitos = somarCategoria(data.debitos);
        const saldoFinal = totalReceitas - totalDebitos;

        tempDiv.querySelectorAll('.tpl-total-receitas').forEach(el => el.innerText = format(totalReceitas));
        tempDiv.querySelectorAll('.tpl-total-debitos').forEach(el => el.innerText = format(totalDebitos));
        
        const saldoFinalEl = tempDiv.querySelector('.tpl-saldo-final');
        saldoFinalEl.innerText = format(saldoFinal);
        if(saldoFinal < 0) saldoFinalEl.style.color = "var(--vermelho)";

        const buildRows = (arr) => arr && arr.length > 0 ? arr.map(item => `<tr><td class="col-data">${item.data}</td><td class="col-desc">${item.desc}</td><td class="col-doc">${item.doc}</td><td class="col-valor">${item.valor}</td><td class="col-saldo">${item.saldo}</td></tr>`).join('') : '<tr><td colspan="5" style="text-align:center; color:#999; font-style:italic; font-size:10px;">Sem movimentação no período</td></tr>';

        tempDiv.querySelector('#tbl-receitas').innerHTML = buildRows(data.receitas);
        tempDiv.querySelector('#tbl-debitos').innerHTML = buildRows(data.debitos);

        containerAlvo.appendChild(tempDiv.firstElementChild);
    }
</script>

</body>
</html>
